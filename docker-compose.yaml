version: "3.8"

services:
  app:
    image: ghcr.io/ly921002/x-cf:latest
    container_name: x-cf
    restart: unless-stopped
    network_mode: host     # 使用宿主机网络
    environment:
      UUID: xxxx
      ARGO_AUTH: ey
      ARGO_DOMAIN: domain
      ARGO_PORT: 8001
      CFIP: www.visa.cn
      PATH_LENGTH: 8  #随机路径长度
      WS_PATH: /api
