version: "3.8"

services:
  app:
    image: ghcr.io/ly921002/x-cf:latest
    container_name: x-cf
    restart: unless-stopped
    network_mode: host     # 使用宿主机网络
    environment:
      UUID: 
      ARGO_AUTH: ey
      ARGO_DOMAIN: domain
      ARGO_PORT: 8001
      CFIP: ip.sb
      IP_v6: false
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
